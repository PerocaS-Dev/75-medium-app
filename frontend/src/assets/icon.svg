<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E687A2"/>
      <stop offset="100%" stop-color="#A98FD6"/>
    </linearGradient>
  </defs>

  <!-- Cream tile -->
  <rect width="512" height="512" rx="115" fill="#F8F3EA"/>

  <!-- Dial ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#2A211B" stroke-width="24"/>

  <!-- 75 numeral (rendered before slider so slider sits on top) -->
  <text
    x="256" y="305"
    text-anchor="middle"
    font-family="Newsreader, Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="190"
    fill="#2A211B">75</text>

  <!-- Slider bar — blush→lilac, sits on top of numerals -->
  <rect x="88" y="255" width="336" height="26" rx="13" fill="url(#sg)"/>

  <!-- Knob at midpoint — medium position -->
  <circle cx="256" cy="268" r="18" fill="#C48CB9"/>
</svg>
