spring.application.name=75-medium
server.port=8080

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/medium75
spring.datasource.username=medium75
spring.datasource.password=medium75
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Object storage (R2/B2) ────────────────────────────────────────────────────
storage.endpoint=${R2_ENDPOINT:}
storage.bucket=${R2_BUCKET_NAME:}
storage.access-key=${R2_ACCESS_KEY_ID:}
storage.secret-key=${R2_SECRET_ACCESS_KEY:}
storage.signed-url-secret=${STORAGE_SIGNED_URL_SECRET:changeme-set-in-env}
storage.signed-url-expiry-minutes=15

# ── Multipart upload limits ───────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
